<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/favicon2.png" />
<link rel="apple-touch-icon" href="/favicon2.png" />
<title>별바라기</title>
<meta name="description" content="오늘 밤의 별 관측 조건을 0-100%로 수치화" />
<meta property="og:title" content="별바라기" />
<meta property="og:description" content="오늘 밤의 별 관측 조건을 0-100%로 수치화" />
<meta property="og:image" content="https://star.wolilab.com/thumbnail2.png" />
<meta property="og:url" content="https://star.wolilab.com/" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="별바라기" />
<meta name="twitter:description" content="오늘 밤의 별 관측 조건을 0-100%로 수치화" />
<meta name="twitter:image" content="https://star.wolilab.com/thumbnail2.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root {
    --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", system-ui, sans-serif;
    --text: #f5f7ff;
    --sub-text: rgba(255,255,255,0.84);
    --card-bg: rgba(0,0,0,0.25);
    --card-border: rgba(255,255,255,0.08);
    --accent: var(--text);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: #14224e;
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* 노을(dusk) 그라데이션 — 실제 앱 theme.ts 의 twilightTheme(dusk) 값 그대로 */
  .app {
    position: fixed; inset: 0;
    background:
      radial-gradient(120% 78% at 50% 113%, rgba(255,170,120,0.55) 0%, rgba(255,150,140,0.25) 30%, rgba(255,150,140,0) 56%),
      linear-gradient(180deg, #14224e 0%, #3a3168 32%, #7a4f7e 55%, #c2727f 76%, #e7a576 100%);
  }

  canvas#sky { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* 구름 — 캔버스가 아니라 실제 앱과 동일하게 CSS 블롭 + 블러 + drift 애니메이션 */
  .clouds { position: fixed; inset: 0; overflow: hidden; pointer-events: none; }
  .cloud-blob {
    position: absolute; left: 0;
    border-radius: 50%;
    filter: blur(20px);
    animation: drift linear infinite;
    background: radial-gradient(50% 50% at 50% 50%, rgba(242,152,142,0.6) 0%, transparent 70%);
  }
  @keyframes drift {
    from { transform: translateX(-60vw); }
    to   { transform: translateX(75vw); }
  }

  .sky-vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 0%, transparent 55%, rgba(0,0,0,0.28) 100%);
  }

  main {
    position: relative; z-index: 2; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }

  .logo { line-height: 0; }
  .logo-mark {
    height: 128px;
    width: auto;
    filter: drop-shadow(0 0 40px rgba(255,186,140,0.2));
  }

  .subtitle {
    margin-top: 12px;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--sub-text);
  }

  .buttons {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    margin-top: 38px;
    max-width: 820px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px;
    border-radius: 99px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(22px) saturate(135%);
    -webkit-backdrop-filter: blur(22px) saturate(135%);
    box-shadow: 0 6px 22px rgba(0,0,0,0.14);
    color: var(--text);
    text-decoration: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  footer {
    position: fixed; left: 0; right: 0; bottom: 26px; z-index: 2;
    text-align: center;
    font-size: 12px;
    color: var(--sub-text);
    opacity: 0.8;
  }
  footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  footer a:hover { opacity: 0.85; }

  @media (max-width: 480px) {
    .logo-mark { height: 56px; }
    .subtitle { font-size: 15px; }
    .buttons { margin-top: 26px; }
  }

  @media (max-height: 560px) {
    .buttons { margin-top: 22px; }
    footer { bottom: 14px; }
  }
  @media (prefers-reduced-motion: reduce) {
    canvas#sky { display: none; }
    .cloud-blob { animation: none; left: 20%; }
  }
</style>
</head>
<body>

<div class="app"></div>
<div class="clouds" id="clouds"></div>
<canvas id="sky"></canvas>
<div class="sky-vignette"></div>

<main>
  <h1 class="logo"><img class="logo-mark" src="/assets/logo.svg" alt="별바라기"></h1>
  <p class="subtitle">오늘 밤 관측 지수를 0-100%로 수치화</p>

  <nav class="buttons" aria-label="다운로드">
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.songsari.starflower">Android 다운로드</a>
    <a class="btn" href="https://apps.apple.com/kr/app/별바라기-별-관측-지수/id6791649030">iOS 다운로드</a>
    <a class="btn" href="https://apps.apple.com/kr/app/별바라기-별-관측-지수/id6791649030">macOS 다운로드</a>
    <a class="btn" href="/web">웹에서 사용</a>
  </nav>
</main>

<footer>© 2026 Songsari · <a href="/privacy-policy">개인정보처리방침</a> · <a href="/support">고객지원</a></footer>

<script>
(function () {
  // ── 구름: 실제 웹앱 Clouds.tsx 와 동일한 블롭 구성(개수·비율만 살짝 확대) ──
  var cloudsEl = document.getElementById('clouds');
  var blobs = [
    { top: '4%',  size: 720, dur: 78,  delay: 0,   o: 0.9  },
    { top: '15%', size: 560, dur: 100, delay: -30, o: 0.7  },
    { top: '30%', size: 820, dur: 125, delay: -60, o: 0.55 },
    { top: '40%', size: 500, dur: 90,  delay: -15, o: 0.6  },
  ];
  blobs.forEach(function (b) {
    var el = document.createElement('div');
    el.className = 'cloud-blob';
    el.style.top = b.top;
    el.style.width = b.size + 'px';
    el.style.height = (b.size * 0.5) + 'px';
    el.style.opacity = b.o;
    el.style.animationDuration = b.dur + 's';
    el.style.animationDelay = b.delay + 's';
    cloudsEl.appendChild(el);
  });

  // ── 별: iOS/Android 최종 튜닝 값(작고 촘촘하게) ──
  var canvas = document.getElementById('sky');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var W, H;
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  var STAR_POOL = 340;
  var stars = [];
  for (var i = 0; i < STAR_POOL; i++) {
    stars.push({
      x: Math.random(), y: Math.random() * 0.88,
      r: Math.pow(Math.random(), 2.4) * 0.55 + 0.15,
      baseA: 0.3 + Math.random() * 0.55,
      speed: 0.4 + Math.random() * 1.6,
      phase: Math.random() * Math.PI * 2,
    });
  }

  function frame(now) {
    var t = now / 1000;
    ctx.clearRect(0, 0, W, H);
    var fadeStart = H * 0.86;
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var tw = reduceMotion ? 0.85 : 0.55 + 0.45 * Math.sin(t * s.speed + s.phase);
      var a = Math.max(0, Math.min(1, s.baseA * tw));
      var x = s.x * W, y = s.y * H;
      if (y > fadeStart) a *= Math.max(0, 1 - (y - fadeStart) / (H - fadeStart));
      if (a <= 0.01) continue;

      var r = s.r * dpr;
      if (s.r > 0.5) {
        var h = r * 3.2;
        var halo = ctx.createRadialGradient(x, y, 0, x, y, h);
        halo.addColorStop(0, 'rgba(205,222,255,' + (a * 0.5).toFixed(3) + ')');
        halo.addColorStop(1, 'rgba(205,222,255,0)');
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(x, y, h, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = s.r > 0.9 ? 'rgba(220,230,255,' + a.toFixed(3) + ')' : 'rgba(255,255,255,' + a.toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    }
    if (!reduceMotion) requestAnimationFrame(frame);
  }
  if (reduceMotion) { frame(0); } else { requestAnimationFrame(frame); }
})();
</script>
</body>
</html>
